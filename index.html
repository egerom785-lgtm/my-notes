<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AeroArcade | 30 Games Portal</title>
    <style>
        /* --- ESTHETICS: FRUTIGER AERO --- */
        :root {
            --glass: rgba(255, 255, 255, 0.3);
            --aero-blue: #0081ff;
            --aero-green: #4ade80;
            --text-dark: #003b5c;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Пузырьки на фоне */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/bubbles.png');
            opacity: 0.2;
            z-index: -1;
        }

        header {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 129, 255, 0.5);
            letter-spacing: 1px;
        }

        /* Сетка игр */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }

        /* Глянец на карточке */
        .game-card::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.05);
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 30px rgba(0, 129, 255, 0.2);
        }

        .game-card .icon { font-size: 50px; margin-bottom: 10px; display: block; }
        .game-card h3 { margin: 5px 0; font-size: 1.1rem; }

        /* Модальное окно игры */
        #game-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff;
            padding: 20px;
            border-radius: 30px;
            position: relative;
            width: 450px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,129,255,0.5);
        }

        .close-btn {
            position: absolute;
            top: -15px; right: -15px;
            background: #ff4757;
            color: white;
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        canvas {
            background: #eee;
            display: block;
            margin: 0 auto;
            border-radius: 10px;
        }

        button.action-btn {
            background: linear-gradient(to bottom, #4ade80, #22c55e);
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #166534;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">AERO ARCADE 🌊</div>
</header>

<div class="container" id="grid"></div>

<div id="game-modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeGame()">X</button>
        <h2 id="game-title">Игра</h2>
        <div id="game-canvas-container"></div>
        <div id="game-controls"></div>
    </div>
</div>

<script>
/* --- DATABASE OF 30 GAMES --- */
const gamesList = [
    { id: 'snake', title: 'Змейка 2.0', icon: '🐍', cat: 'Классика' },
    { id: 'clicker', title: 'Aero Clicker', icon: '🖱️', cat: 'Аркада' },
    { id: 'mines', title: 'Сапер', icon: '💣', cat: 'Логика' },
    { id: 'reaction', title: 'Реакция', icon: '⚡', cat: 'Спорт' },
    { id: 'memory', title: 'Память', icon: '🧩', cat: 'Логика' },
    { id: 'pong', title: 'Понг', icon: '🏓', cat: 'Классика' },
    { id: 'dice', title: 'Кости', icon: '🎲', cat: 'Шанс' },
    { id: 'color', title: 'Цветной Бум', icon: '🎨', cat: 'Логика' },
    { id: 'bird', title: 'Aero Bird', icon: '🐦', cat: 'Аркада' },
    { id: 'math', title: 'Мега Мозг', icon: '🧮', cat: 'Обучение' },
    // Заглушки для достижения 30 игр
    { id: 'box', title: 'Коробки', icon: '📦', cat: 'Аркада' },
    { id: 'jump', title: 'Прыгун', icon: '🦘', cat: 'Аркада' },
    { id: 'race', title: 'Гонка', icon: '🏎️', cat: 'Спорт' },
    { id: 'baloon', title: 'Шарики', icon: '🎈', cat: 'Аркада' },
    { id: 'tictac', title: 'Крестики', icon: '❌', cat: 'Логика' },
    { id: 'water', title: 'Вода', icon: '💧', cat: 'Релакс' },
    { id: 'stars', title: 'Звезды', icon: '⭐', cat: 'Аркада' },
    { id: 'ghost', title: 'Призрак', icon: '👻', cat: 'Ужас' },
    { id: 'pizza', title: 'Пицца', icon: '🍕', cat: 'Кухня' },
    { id: 'tower', title: 'Башня', icon: '🏗️', cat: 'Логика' },
    { id: 'fish', title: 'Рыбалка', icon: '🎣', cat: 'Спорт' },
    { id: 'soccer', title: 'Футбол', icon: '⚽', cat: 'Спорт' },
    { id: 'piano', title: 'Пианино', icon: '🎹', cat: 'Музыка' },
    { id: 'space', title: 'Космос', icon: '🚀', cat: 'Аркада' },
    { id: 'apple', title: 'Яблоки', icon: '🍎', cat: 'Аркада' },
    { id: 'clock', title: 'Время', icon: '⏰', cat: 'Логика' },
    { id: 'light', title: 'Лампа', icon: '💡', cat: 'Логика' },
    { id: 'gem', title: 'Алмазы', icon: '💎', cat: 'Три-в-ряд' },
    { id: 'cloud', title: 'Облака', icon: '☁️', cat: 'Релакс' },
    { id: 'fire', title: 'Огонь', icon: '🔥', cat: 'Аркада' }
];

const grid = document.getElementById('grid');
const modal = document.getElementById('game-modal');
const container = document.getElementById('game-canvas-container');

// Рендер карточек
gamesList.forEach(game => {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.innerHTML = `<span class="icon">${game.icon}</span><h3>${game.title}</h3><small>${game.cat}</small>`;
    card.onclick = () => launchGame(game.id, game.title);
    grid.appendChild(card);
});

function closeGame() {
    modal.style.display = 'none';
    container.innerHTML = '';
}

function launchGame(id, title) {
    modal.style.display = 'flex';
    document.getElementById('game-title').innerText = title;
    container.innerHTML = '';

    if (id === 'snake') initSnake();
    else if (id === 'clicker') initClicker();
    else if (id === 'reaction') initReaction();
    else if (id === 'dice') initDice();
    else if (id === 'math') initMath();
    else {
        container.innerHTML = `<p style="padding:20px">Игра "${title}" находится в разработке... <br> (Это демонстрационная заглушка для списка из 30 игр)</p>`;
    }
}

/* --- GAME 1: SNAKE --- */
function initSnake() {
    const canvas = document.createElement('canvas');
    canvas.width = 300; canvas.height = 300;
    container.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    let snake = [{x: 10, y: 10}];
    let food = {x: 15, y: 15};
    let dx = 1, dy = 0;
    
    const game = setInterval(() => {
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        if (head.x < 0 || head.x >= 30 || head.y < 0 || head.y >= 30) return clearInterval(game);
        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            food = {x: Math.floor(Math.random()*30), y: Math.floor(Math.random()*30)};
        } else { snake.pop(); }
        
        ctx.fillStyle = '#eee'; ctx.fillRect(0,0,300,300);
        ctx.fillStyle = 'green'; snake.forEach(s => ctx.fillRect(s.x*10, s.y*10, 9, 9));
        ctx.fillStyle = 'red'; ctx.fillRect(food.x*10, food.y*10, 9, 9);
    }, 100);

    window.onkeydown = (e) => {
        if (e.key === 'ArrowUp') { dx=0; dy=-1; }
        if (e.key === 'ArrowDown') { dx=0; dy=1; }
        if (e.key === 'ArrowLeft') { dx=-1; dy=0; }
        if (e.key === 'ArrowRight') { dx=1; dy=0; }
    };
}

/* --- GAME 2: CLICKER --- */
function initClicker() {
    let score = 0;
    const btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.style.fontSize = '30px';
    btn.innerText = 'КЛИКАЙ! 🫧';
    const display = document.createElement('h1');
    display.innerText = score;
    container.appendChild(display);
    container.appendChild(btn);
    btn.onclick = () => { score++; display.innerText = score; };
}

/* --- GAME 3: REACTION --- */
function initReaction() {
    container.innerHTML = '<p>Нажми, когда экран станет ЗЕЛЕНЫМ</p>';
    const box = document.createElement('div');
    box.style.width = '100%'; box.style.height = '150px'; box.style.background = 'red';
    box.style.borderRadius = '20px';
    container.appendChild(box);
    
    setTimeout(() => {
        box.style.background = 'lime';
        const start = Date.now();
        box.onclick = () => {
            const time = Date.now() - start;
            alert(`Твоя реакция: ${time} мс!`);
            closeGame();
        };
    }, 1000 + Math.random() * 3000);
}

/* --- GAME 4: DICE --- */
function initDice() {
    const btn = document.createElement('button');
    btn.className = 'action-btn'; btn.innerText = 'Бросить кубик';
    const res = document.createElement('div');
    res.style.fontSize = '80px'; res.innerText = '🎲';
    container.appendChild(res); container.appendChild(btn);
    btn.onclick = () => { res.innerText = Math.floor(Math.random()*6) + 1; };
}

/* --- GAME 5: MATH --- */
function initMath() {
    const a = Math.floor(Math.random()*50), b = Math.floor(Math.random()*50);
    container.innerHTML = `<h3>Сколько будет ${a} + ${b}?</h3>`;
    const input = document.createElement('input');
    input.type = 'number'; container.appendChild(input);
    const btn = document.createElement('button');
    btn.className = 'action-btn'; btn.innerText = 'Проверить';
    container.appendChild(btn);
    btn.onclick = () => {
        if(parseInt(input.value) === a+b) alert('Верно!');
        else alert('Ошибка!');
        initMath();
    };
}
</script>
</body>
</html>
