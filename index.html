<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AeroArcade 2026 | 30 Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bubbles"></div>
    <header>
        <div class="logo">AERO<span>ARCADE</span></div>
        <p>Легендарный портал глянцевых игр</p>
    </header>

    <main class="game-grid" id="grid"></main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="game-title">Название игры</span>
                <button onclick="closeGame()">×</button>
            </div>
            <div id="game-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
