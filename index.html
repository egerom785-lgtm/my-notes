<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Discord Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <nav class="servers">
            <div class="server-icon active">H</div>
            <div class="server-icon">+</div>
        </nav>

        <aside class="channels">
            <header><h3>Мой Сервер</h3></header>
            <div class="channel-list">
                <div class="category">Текстовые каналы</div>
                <div class="channel active"># основной</div>
                <div class="category">Голосовые каналы</div>
                <div class="channel">🔈 Общий</div>
            </div>
            <div class="user-settings">
                <img id="avatar" src="default-avatar.png" alt="">
                <span id="username">User#0001</span>
                <button onclick="openSettings()">⚙️</button>
            </div>
        </aside>

        <main class="chat-area">
            <div id="messages"></div>
            <div class="input-container">
                <input type="text" id="msg-input" placeholder="Написать в #основной">
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
